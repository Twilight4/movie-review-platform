---
extends: default

rules:
  line-length:
    max: 120
    level: warning
  indentation:
    spaces: 2
    indent-sequences: true
  comments:
    min-spaces-from-content: 1
  document-start: disable
  truthy:
    allowed-values: ['true', 'false', 'on', 'off']
    check-keys: false

ignore: |
  .github/
  node_modules/
  .terraform/
  terraform/envs/*/.terraform/
  **/templates/**
  **/charts/**
  *.tpl
