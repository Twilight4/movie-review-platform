# Example: Create Grafana admin credentials secret
# DO NOT commit actual credentials to git!
#
# Usage:
#   kubectl create secret generic grafana-admin-credentials \
#     --from-literal=admin-user=admin \
#     --from-literal=admin-password=<SECURE_RANDOM_PASSWORD> \
#     -n monitoring
#
# Or use this template (replace <BASE64_ENCODED_PASSWORD>):
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
type: Opaque
data:
  admin-user: YWRtaW4= # base64 encoded "admin"
  admin-password: <BASE64_ENCODED_PASSWORD> # Replace with: echo -n 'your-secure-password' | base64
